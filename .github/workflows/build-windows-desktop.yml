name: Build Windows Desktop

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to stage under dist-release/<version> (defaults to apps/electron/package.json)"
        required: false
        type: string

concurrency:
  group: build-windows-desktop-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: OriginAI Windows x64 artifact
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows installer
        shell: pwsh
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
        run: powershell -ExecutionPolicy Bypass -File apps\electron\scripts\build-win.ps1

      - name: Stage dist-release layout
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = node -p "require('./apps/electron/package.json').version"
          }
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $target = "dist-release/$version/windows-x86_64"
          New-Item -ItemType Directory -Force -Path $target | Out-Null
          Copy-Item "apps/electron/release/OriginAI-x64.exe" "$target/OriginAI-x64.exe"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: originai-windows-x64-${{ env.VERSION }}
          path: dist-release/${{ env.VERSION }}/windows-x86_64/OriginAI-x64.exe
          if-no-files-found: error
          retention-days: 14
