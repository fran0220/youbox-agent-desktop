# Historical only: OC/WebChat runtime routes moved to jaco-cloud.
# Do not include this file in JAcoworks-Next production deploys.

# OC Gateway routes → oc-gateway on local server (via Tailscale)
# Place in /www/sites/jacoapi.jingao.club/proxy/oc-gateway.conf

# WebSocket proxy (long-lived connections)
location /ws/oc {
    proxy_pass http://10.10.0.2:18700;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;  # 24h for long-lived WS
    proxy_send_timeout 86400s;
}

# SSE stream (long-lived connections)
location /api/oc/stream {
    proxy_pass http://10.10.0.2:18700;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 86400s;
}

# OC API routes (normal HTTP)
location /api/oc/ {
    proxy_pass http://10.10.0.2:18700;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

