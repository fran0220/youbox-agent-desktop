{% extends "base.html" %}

{% block title %}反馈与建议 — JAcoworks{% endblock %}

{% block content %}
<section class="py-16 sm:py-24">
  <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-12">
      <h1 class="text-3xl sm:text-4xl font-bold text-gray-900">反馈与建议</h1>
      <p class="mt-4 text-lg text-gray-500">帮助我们改进 JAcoworks</p>
    </div>

    <div id="feedback-form-container">
      <form class="bg-white rounded-2xl shadow-sm p-8 space-y-6"
            hx-post="/feedback"
            hx-swap="outerHTML"
            hx-target="#feedback-form-container">
        <!-- 姓名 -->
        <div>
          <label for="name" class="block text-sm font-medium text-gray-700 mb-1">姓名 <span class="text-gray-400">(可选)</span></label>
          <input type="text" id="name" name="name"
                 class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-cream/50 focus:outline-none focus:ring-2 focus:ring-terra/30 focus:border-terra transition-colors"
                 placeholder="你的名字">
        </div>

        <!-- 邮箱 -->
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">邮箱 <span class="text-gray-400">(可选)</span></label>
          <input type="email" id="email" name="email"
                 class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-cream/50 focus:outline-none focus:ring-2 focus:ring-terra/30 focus:border-terra transition-colors"
                 placeholder="your@email.com">
        </div>

        <!-- 类型 -->
        <div>
          <label for="category" class="block text-sm font-medium text-gray-700 mb-1">类型</label>
          <select id="category" name="category"
                  class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-cream/50 focus:outline-none focus:ring-2 focus:ring-terra/30 focus:border-terra transition-colors">
            <option value="bug">Bug 报告</option>
            <option value="feature">功能建议</option>
            <option value="general" selected>一般反馈</option>
          </select>
        </div>

        <!-- 应用版本 -->
        <div>
          <label for="app_version" class="block text-sm font-medium text-gray-700 mb-1">应用版本 <span class="text-gray-400">(可选)</span></label>
          <input type="text" id="app_version" name="app_version"
                 class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-cream/50 focus:outline-none focus:ring-2 focus:ring-terra/30 focus:border-terra transition-colors"
                 placeholder="例如: 1.0.0">
        </div>

        <!-- 详细描述 -->
        <div>
          <label for="message" class="block text-sm font-medium text-gray-700 mb-1">详细描述 <span class="text-terra">*</span></label>
          <textarea id="message" name="message" rows="6" required
                    class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-cream/50 focus:outline-none focus:ring-2 focus:ring-terra/30 focus:border-terra transition-colors resize-y"
                    placeholder="请描述你遇到的问题或建议…"></textarea>
        </div>

        <!-- Submit -->
        <button type="submit"
                class="w-full py-3 px-6 rounded-xl bg-terra text-white font-semibold hover:bg-terra-dark transition-colors shadow-sm">
          提交反馈
        </button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
