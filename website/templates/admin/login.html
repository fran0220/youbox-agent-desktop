<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台登录 — JAcoworks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
        },
        colors: {
          cream: '#F5F0EB',
          'cream-dark': '#EDE5DC',
          terra: '#C4724A',
          'terra-dark': '#A85D3A',
          'terra-light': '#D4956F',
        },
        borderRadius: {
          'xl': '1rem',
          '2xl': '1.5rem',
        }
      }
    }
  }
  </script>
</head>
<body class="bg-cream min-h-screen flex items-center justify-center font-sans px-4">
  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-terra">JAcoworks</h1>
      <p class="mt-2 text-gray-500">管理后台</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-2xl shadow-sm p-8">
      {% if let Some(message) = error %}
      <div class="mb-6 px-4 py-3 rounded-xl bg-red-50 border border-red-200 text-red-700 text-sm">
        {{ message }}
      </div>
      {% endif %}

      {% if let Some(url) = feishu_url %}
      <a href="{{ url }}"
         class="flex items-center justify-center gap-2 w-full py-3 px-6 rounded-xl bg-[#3370FF] text-white font-semibold hover:bg-[#2B5FD9] transition-colors shadow-sm">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
          <path d="M4.5 3l6.5 4.5v4L4.5 7.5V3zm0 18l6.5-4v-4.5L4.5 17v4zm15-18l-6.5 4.5v4l6.5-4V3zm0 18l-6.5-4v-4.5l6.5 4.5v4z"/>
        </svg>
        飞书账号登录
      </a>
      <div class="relative my-5">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
        <div class="relative flex justify-center"><span class="bg-white px-3 text-sm text-gray-400">或</span></div>
      </div>
      {% endif %}

      <form method="post" action="/admin/login" class="space-y-5">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
          <input type="email" id="email" name="email" required
                 class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-cream/50 focus:outline-none focus:ring-2 focus:ring-terra/30 focus:border-terra transition-colors"
                 placeholder="admin@example.com">
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">密码</label>
          <input type="password" id="password" name="password" required
                 class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-cream/50 focus:outline-none focus:ring-2 focus:ring-terra/30 focus:border-terra transition-colors"
                 placeholder="••••••••">
        </div>

        <button type="submit"
                class="w-full py-3 px-6 rounded-xl bg-terra text-white font-semibold hover:bg-terra-dark transition-colors shadow-sm">
          登录
        </button>
      </form>
    </div>

    <p class="mt-6 text-center text-sm text-gray-400">
      <a href="/" class="hover:text-terra transition-colors">← 返回首页</a>
    </p>
  </div>
</body>
</html>
