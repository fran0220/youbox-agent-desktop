{% extends "admin/layout.html" %}

{% block title %}版本发布{% endblock %}
{% block page_title %}版本发布{% endblock %}

{% block header_actions %}
<button onclick="document.getElementById('release-form').classList.toggle('hidden')"
        class="px-5 py-2.5 rounded-xl bg-terra text-white text-sm font-medium hover:bg-terra-dark transition-colors">
  发布新版本
</button>
{% endblock %}

{% block admin_content %}
<!-- Create Form -->
<div id="release-form" class="hidden mb-6">
  <form class="bg-white rounded-2xl shadow-sm p-6"
        hx-post="/admin/releases"
        hx-target="#releases-list"
        hx-swap="innerHTML"
        hx-on::after-request="if(event.detail.successful) document.getElementById('release-form').classList.add('hidden')">
    <h3 class="text-lg font-semibold text-gray-900 mb-4">发布新版本</h3>
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">版本号</label>
        <input type="text" name="version" required placeholder="例如: 1.0.0"
               class="w-full max-w-xs px-4 py-2.5 rounded-xl border border-gray-200 bg-cream/50 focus:outline-none focus:ring-2 focus:ring-terra/30 focus:border-terra transition-colors text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">更新日志 <span class="text-gray-400">(Markdown)</span></label>
        <textarea name="notes" rows="6"
                  class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-cream/50 focus:outline-none focus:ring-2 focus:ring-terra/30 focus:border-terra transition-colors text-sm resize-y"
                  placeholder="## 新增功能&#10;- ...&#10;&#10;## 修复&#10;- ..."></textarea>
      </div>
    </div>
    <div class="mt-4 flex gap-3">
      <button type="submit"
              class="px-5 py-2.5 rounded-xl bg-terra text-white text-sm font-medium hover:bg-terra-dark transition-colors">
        发布
      </button>
      <button type="button" onclick="document.getElementById('release-form').classList.add('hidden')"
              class="px-5 py-2.5 rounded-xl bg-gray-100 text-gray-700 text-sm font-medium hover:bg-gray-200 transition-colors">
        取消
      </button>
    </div>
  </form>
</div>

<!-- Releases List -->
<div id="releases-list" class="space-y-6">
  {% include "admin/partials/releases_list.html" %}
</div>
{% endblock %}
