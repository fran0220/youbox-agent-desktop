<tr class="hover:bg-gray-50/50 transition-colors">
  <td class="px-6 py-4 text-gray-400 font-mono text-xs" title="{{ user.id }}">
    {{ user.id|truncate(8) }}…
  </td>
  <td class="px-6 py-4 text-gray-900 font-medium">{{ user.name }}</td>
  <td class="px-6 py-4 text-gray-600">{{ user.email }}</td>
  <td class="px-6 py-4">
    {% if user.role == "admin" %}
    <span class="inline-flex px-2.5 py-0.5 rounded-lg text-xs font-medium bg-red-50 text-red-700">admin</span>
    {% else %}
    <span class="inline-flex px-2.5 py-0.5 rounded-lg text-xs font-medium bg-blue-50 text-blue-700">user</span>
    {% endif %}
  </td>
  <td class="px-6 py-4 text-gray-400">{{ user.created_at }}</td>
  <td class="px-6 py-4">
    <div class="flex items-center gap-2">
      <a href="/admin/users/{{ user.id }}" class="text-terra hover:text-terra-dark text-xs font-medium transition-colors">
        查看详情
      </a>
      <button hx-post="/admin/users/{{ user.id }}/toggle-role"
              hx-target="closest tr"
              hx-swap="outerHTML"
              class="text-gray-400 hover:text-gray-600 text-xs font-medium transition-colors">
        变更角色
      </button>
    </div>
  </td>
</tr>
