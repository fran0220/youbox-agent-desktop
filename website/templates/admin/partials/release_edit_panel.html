<div id="release-edit-panel" class="bg-white rounded-2xl shadow-sm p-6">
  <h3 class="text-lg font-semibold text-gray-900 mb-4">版本信息</h3>
  <form hx-put="/admin/releases/{{ release.id }}"
        hx-target="#release-edit-panel"
        hx-swap="outerHTML"
        class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">版本号</label>
      <input type="text" name="version" value="{{ release.version }}" required
             class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-cream/50 focus:outline-none focus:ring-2 focus:ring-terra/30 focus:border-terra transition-colors text-sm">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">更新日志</label>
      <textarea name="notes" rows="10"
                class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-cream/50 focus:outline-none focus:ring-2 focus:ring-terra/30 focus:border-terra transition-colors text-sm resize-y">{{ release.notes }}</textarea>
    </div>
    <button type="submit"
            class="px-5 py-2.5 rounded-xl bg-terra text-white text-sm font-medium hover:bg-terra-dark transition-colors">
      保存修改
    </button>
  </form>
</div>
