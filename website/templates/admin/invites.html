{% extends "admin/layout.html" %}

{% block title %}激活码管理{% endblock %}
{% block page_title %}激活码管理{% endblock %}

{% block header_actions %}
<button onclick="document.getElementById('create-form').classList.toggle('hidden')"
        class="px-5 py-2.5 rounded-xl bg-terra text-white text-sm font-medium hover:bg-terra-dark transition-colors">
  创建激活码
</button>
{% endblock %}

{% block admin_content %}
<!-- Create Form (hidden by default) -->
<div id="create-form" class="hidden mb-6">
  <form class="bg-white rounded-2xl shadow-sm p-6"
        hx-post="/admin/invites"
        hx-target="#invites-table"
        hx-swap="innerHTML"
        hx-on::after-request="if(event.detail.successful) document.getElementById('create-form').classList.add('hidden')">
    <h3 class="text-lg font-semibold text-gray-900 mb-4">创建新激活码</h3>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">角色</label>
        <select name="role"
                class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-cream/50 focus:outline-none focus:ring-2 focus:ring-terra/30 focus:border-terra transition-colors text-sm">
          <option value="user">user</option>
          <option value="admin">admin</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">最大使用次数</label>
        <input type="number" name="max_uses" value="1" min="1"
               class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-cream/50 focus:outline-none focus:ring-2 focus:ring-terra/30 focus:border-terra transition-colors text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">备注</label>
        <input type="text" name="note" placeholder="可选备注"
               class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-cream/50 focus:outline-none focus:ring-2 focus:ring-terra/30 focus:border-terra transition-colors text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">过期时间 <span class="text-gray-400">(可选)</span></label>
        <input type="datetime-local" name="expires_at"
               class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-cream/50 focus:outline-none focus:ring-2 focus:ring-terra/30 focus:border-terra transition-colors text-sm">
      </div>
    </div>
    <div class="mt-4 flex gap-3">
      <button type="submit"
              class="px-5 py-2.5 rounded-xl bg-terra text-white text-sm font-medium hover:bg-terra-dark transition-colors">
        创建
      </button>
      <button type="button" onclick="document.getElementById('create-form').classList.add('hidden')"
              class="px-5 py-2.5 rounded-xl bg-gray-100 text-gray-700 text-sm font-medium hover:bg-gray-200 transition-colors">
        取消
      </button>
    </div>
  </form>
</div>

<!-- Invites Table -->
<div class="bg-white rounded-2xl shadow-sm overflow-hidden">
  <div id="invites-table" class="overflow-x-auto">
    {% include "admin/partials/invites_table.html" %}
  </div>
</div>
{% endblock %}
