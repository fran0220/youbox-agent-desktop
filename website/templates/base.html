<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}JAcoworks{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
        },
        colors: {
          cream: '#F5F0EB',
          'cream-dark': '#EDE5DC',
          terra: '#C4724A',
          'terra-dark': '#A85D3A',
          'terra-light': '#D4956F',
        },
        borderRadius: {
          'xl': '1rem',
          '2xl': '1.5rem',
        }
      }
    }
  }
  </script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link rel="stylesheet" href="/static/css/style.css">
  {% block head %}{% endblock %}
</head>
<body class="bg-cream text-gray-800 min-h-screen flex flex-col font-sans">
  <!-- Navigation -->
  <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-cream-dark">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <!-- Logo -->
        <a href="/" class="flex items-center gap-2">
          <span class="text-xl font-bold text-terra">JAcoworks</span>
        </a>

        <!-- Desktop Nav -->
        <div class="hidden md:flex items-center gap-8">
          <a href="/" class="text-gray-600 hover:text-terra transition-colors">首页</a>
          <a href="/download" class="text-gray-600 hover:text-terra transition-colors">下载</a>
          <a href="/docs" class="text-gray-600 hover:text-terra transition-colors">文档</a>
          <a href="/games" class="text-gray-600 hover:text-terra transition-colors">游戏广场</a>
          <a href="/chat" class="text-gray-600 hover:text-terra transition-colors">AI 对话</a>
          <a href="/feedback" class="text-gray-600 hover:text-terra transition-colors">反馈</a>
        </div>

        <!-- Admin entry -->
        <div class="hidden md:flex items-center gap-4">
          <a href="/admin"
             class="text-gray-500 hover:text-gray-800 transition-colors"
             title="管理后台"
             aria-label="管理后台">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3l7 4v5c0 5-3.8 8.6-7 9-3.2-.4-7-4-7-9V7l7-4z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.5 12.5l1.8 1.8 3.2-3.2"/>
            </svg>
          </a>
        </div>

        <!-- Mobile menu button -->
        <button id="mobile-menu-btn" class="md:hidden p-2 rounded-lg hover:bg-cream-dark transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile menu -->
    <div id="mobile-menu" class="hidden md:hidden border-t border-cream-dark bg-white">
      <div class="px-4 py-3 space-y-2">
        <a href="/" class="block px-3 py-2 rounded-lg text-gray-600 hover:bg-cream hover:text-terra transition-colors">首页</a>
        <a href="/download" class="block px-3 py-2 rounded-lg text-gray-600 hover:bg-cream hover:text-terra transition-colors">下载</a>
        <a href="/docs" class="block px-3 py-2 rounded-lg text-gray-600 hover:bg-cream hover:text-terra transition-colors">文档</a>
        <a href="/games" class="block px-3 py-2 rounded-lg text-gray-600 hover:bg-cream hover:text-terra transition-colors">游戏广场</a>
        <a href="/chat" class="block px-3 py-2 rounded-lg text-gray-600 hover:bg-cream hover:text-terra transition-colors">AI 对话</a>
        <a href="/feedback" class="block px-3 py-2 rounded-lg text-gray-600 hover:bg-cream hover:text-terra transition-colors">反馈</a>
        <a href="/admin"
           class="block px-3 py-2 rounded-lg text-gray-600 hover:bg-cream hover:text-terra transition-colors">管理后台</a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="flex-1">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="bg-white border-t border-cream-dark mt-auto">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
      <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
        <div class="col-span-1 md:col-span-2">
          <span class="text-xl font-bold text-terra">JAcoworks</span>
          <p class="mt-3 text-gray-500 text-sm leading-relaxed">
            企业 AI 协同办公平台<br>
            本地优先，隐私安全，多模型支持
          </p>
        </div>
        <div>
          <h4 class="font-semibold text-gray-800 mb-3">产品</h4>
          <ul class="space-y-2 text-sm text-gray-500">
            <li><a href="/download" class="hover:text-terra transition-colors">下载</a></li>
            <li><a href="/docs" class="hover:text-terra transition-colors">文档</a></li>
            <li><a href="/about" class="hover:text-terra transition-colors">关于</a></li>
          </ul>
        </div>
        <div>
          <h4 class="font-semibold text-gray-800 mb-3">社区</h4>
          <ul class="space-y-2 text-sm text-gray-500">
            <li><a href="/admin" class="hover:text-terra transition-colors">管理后台</a></li>
            <li><a href="/feedback" class="hover:text-terra transition-colors">反馈</a></li>
          </ul>
        </div>
      </div>
      <div class="mt-8 pt-8 border-t border-cream-dark text-center text-sm text-gray-400">
        &copy; 2025 JAcoworks. All rights reserved.
      </div>
    </div>
  </footer>

  <!-- PostHog Analytics -->
  <script>
    !function(t,e){var o,n,p,r;e.__SV||(window.posthog=e,e._i=[],e.init=function(i,s,a){function g(t,e){var o=e.split(".");2==o.length&&(t=t[o[0]],e=o[1]),t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}}(p=t.createElement("script")).type="text/javascript",p.crossOrigin="anonymous",p.async=!0,p.src=s.api_host.replace(".i.posthog.com","-assets.i.posthog.com")+"/static/array.js",(r=t.getElementsByTagName("script")[0]).parentNode.insertBefore(p,r);var u=e;for(void 0!==a?u=e[a]=[]:a="posthog",u.people=u.people||[],u.toString=function(t){var e="posthog";return"posthog"!==a&&(e+="."+a),t||(e+=" (stub)"),e},u.people.toString=function(){return u.toString(1)+".people (stub)"},o="init capture register register_once register_for_session unregister unregister_for_session getFeatureFlag getFeatureFlagPayload isFeatureEnabled reloadFeatureFlags updateEarlyAccessFeatureEnrollment getEarlyAccessFeatures on onFeatureFlags onSessionId getSurveys getActiveMatchingSurveys renderSurvey canRenderSurvey getNextSurveyStep identify setPersonProperties group resetGroups setPersonPropertiesForFlags resetPersonPropertiesForFlags setGroupPropertiesForFlags resetGroupPropertiesForFlags reset get_distinct_id getGroups get_session_id get_session_replay_url alias set_config startSessionRecording stopSessionRecording sessionRecordingStarted captureException loadToolbar get_property getSessionProperty createPersonProfile opt_in_capturing opt_out_capturing has_opted_in_capturing has_opted_out_capturing clear_opt_in_out_capturing debug".split(" "),n=0;n<o.length;n++)g(u,o[n]);e._i.push([i,s,a])},e.__SV=1)}(document,window.posthog||[]);
    posthog.init('phc_FKITD0zxf8WfUsB15HS97a99W36pqPZ1lb1V3NnlcLW', {
      api_host: 'https://us.i.posthog.com',
      person_profiles: 'identified_only',
      capture_pageview: true,
      capture_pageleave: true,
      autocapture: true,
    });
  </script>

  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
